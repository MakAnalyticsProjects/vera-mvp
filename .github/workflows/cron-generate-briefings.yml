name: Generate daily AI briefings

# Phase 3 of the May 7 implementation plan. Runs once a day at 7am Central
# (12:00 UTC during CDT, 13:00 UTC during CST — pick CDT since most of the
# year). Calls the Vercel route which iterates tenants, generates one
# AI-written briefing per tenant, writes to the `Briefing` table.
#
# `workflow_dispatch` lets us fire this on demand for testing.

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call briefing-generator endpoint
        run: |
          curl -fsS -X POST https://vera-mvp.vercel.app/api/cron/generate-briefings \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
