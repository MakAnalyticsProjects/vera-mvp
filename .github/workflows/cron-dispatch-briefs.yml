name: Dispatch scheduled AR briefs

# Runs every 15 minutes, hits the Vercel route which queries the `Schedule`
# table from Neon and fires any schedules whose nextRunAt has passed.
#
# Cron uses STAGGERED minutes (7, 22, 37, 52) instead of the round
# */15 boundary on purpose — GitHub's own docs note that scheduled
# workflows are "delayed during periods of high load, including the start
# of every hour" and community-confirmed: workflows on round-minute
# boundaries get queued behind everyone else's */N cron and frequently
# skip ticks. Off-peak minutes sidestep that.
#
# `workflow_dispatch` lets us fire this manually from the GitHub UI for
# testing without waiting for the cron slot.

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call dispatch endpoint
        run: |
          curl -fsS -X POST https://vera-mvp.vercel.app/api/cron/dispatch-briefs \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
