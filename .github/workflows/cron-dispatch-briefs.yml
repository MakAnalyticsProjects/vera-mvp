name: Dispatch scheduled AR briefs

# Phase 2 of the May 7 implementation plan. Runs every 15 minutes, hits the
# Vercel route which queries the `Schedule` table from Neon and fires any
# schedules whose nextRunAt has passed.
#
# `workflow_dispatch` lets us fire this manually from the GitHub UI for
# testing without waiting for the cron slot.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call dispatch endpoint
        run: |
          curl -fsS -X POST https://vera-mvp.vercel.app/api/cron/dispatch-briefs \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
